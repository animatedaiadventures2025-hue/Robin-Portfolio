<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Nomad Gear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <div class="logo-icon">🧭</div>
        <span>Nomad Gear</span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Shop</a></li>
        <li><a href="index.html#featured">New Arrivals</a></li>
        <li><a href="index.html#sale">Sale</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="cart-link">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge">0</span>
        </a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Product Detail -->
  <section class="product-detail">
    <div class="container">
      <div class="product-detail-grid" id="product-detail">
        <!-- Rendered by JS -->
      </div>

      <!-- Related Products -->
      <div class="related-section">
        <h2>You might also like</h2>
        <div class="related-grid" id="related-grid">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <a href="index.html" class="logo">
            <div class="logo-icon">🧭</div>
            <span>Nomad Gear</span>
          </a>
          <p>Premium outdoor equipment for every adventure.</p>
        </div>
        <div class="footer-links"><h4>Shop</h4><ul><li><a href="#">All Products</a></li></ul></div>
        <div class="footer-links"><h4>Company</h4><ul><li><a href="#">About</a></li></ul></div>
        <div class="footer-links"><h4>Support</h4><ul><li><a href="#">FAQ</a></li></ul></div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 Nomad Gear. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Toast -->
  <div id="cart-toast">✓ Added to cart</div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script>
    // Product detail page logic
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const productId = parseInt(params.get('id'));
      const product = products.find(p => p.id === productId);

      if (!product) {
        document.getElementById('product-detail').innerHTML = '<p style="text-align:center;padding:80px;">Product not found. <a href="index.html">Back to shop</a></p>';
        return;
      }

      // Update page title
      document.title = `${product.name} — Nomad Gear`;

      const isClothing = product.category === 'Clothing';

      document.getElementById('product-detail').innerHTML = `
        <div class="image-gallery">
          <div class="main-image">
            <div class="product-placeholder" style="background: ${getCategoryColor(product.category)}; height: 100%; font-size: 6rem; border-radius: 16px;">
              ${getCategoryEmoji(product.category)}
            </div>
          </div>
          <div class="thumbnails">
            ${[1,2,3,4].map(i => `
              <div class="thumbnail ${i === 1 ? 'active' : ''}">
                <div class="product-placeholder" style="background: ${getCategoryColor(product.category)}; height: 100%; font-size: 1.5rem; border-radius: 10px;">
                  ${getCategoryEmoji(product.category)}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="product-detail-info">
          <span class="product-category">${product.category}</span>
          <h1>${product.name}</h1>
          <div class="product-rating">
            <span class="stars">${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5 - Math.floor(product.rating))}</span>
            <span class="rating-value">${product.rating} out of 5</span>
          </div>
          <span class="product-price">$${product.price}</span>
          <p class="product-description">${product.description}</p>
          ${isClothing ? `
            <div class="option-group">
              <span class="option-label">Size</span>
              <div class="size-options">
                ${['S','M','L','XL'].map((s,i) => `
                  <button class="size-btn ${i === 1 ? 'active' : ''}" data-size="${s}">${s}</button>
                `).join('')}
              </div>
            </div>
          ` : ''}
          <div class="option-group">
            <span class="option-label">Quantity</span>
            <div class="quantity-picker">
              <button class="qty-btn" id="qty-minus">−</button>
              <input type="number" class="qty-input" id="qty-input" value="1" min="1" max="10">
              <button class="qty-btn" id="qty-plus">+</button>
            </div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-primary btn-lg" id="add-to-cart">Add to Cart</button>
            <button class="btn btn-outline btn-lg">Buy Now</button>
          </div>
        </div>
      `;

      // Size selector
      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });

      // Quantity picker
      const qtyInput = document.getElementById('qty-input');
      document.getElementById('qty-minus').addEventListener('click', () => {
        qtyInput.value = Math.max(1, parseInt(qtyInput.value) - 1);
      });
      document.getElementById('qty-plus').addEventListener('click', () => {
        qtyInput.value = Math.min(10, parseInt(qtyInput.value) + 1);
      });

      // Add to cart
      document.getElementById('add-to-cart').addEventListener('click', () => {
        const qty = parseInt(qtyInput.value);
        const sizeEl = document.querySelector('.size-btn.active');
        const size = sizeEl ? sizeEl.dataset.size : null;
        Cart.addItem(product.id, qty, size);
      });

      // Related products (same category, excluding current)
      const related = products.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
      if (related.length === 0) {
        // If no same-category, show random
        const others = products.filter(p => p.id !== product.id).slice(0, 4);
        renderRelated(others);
      } else {
        renderRelated(related);
      }
    });

    function renderRelated(items) {
      const grid = document.getElementById('related-grid');
      grid.innerHTML = items.map(p => `
        <div class="product-card">
          <a href="product.html?id=${p.id}" class="product-image">
            <div class="product-placeholder" style="background: ${getCategoryColor(p.category)}">
              <span>${getCategoryEmoji(p.category)}</span>
            </div>
          </a>
          <div class="product-info">
            <span class="product-category">${p.category}</span>
            <a href="product.html?id=${p.id}"><h3 class="product-name">${p.name}</h3></a>
            <div class="product-rating">
              <span class="stars">${'★'.repeat(Math.floor(p.rating))}</span>
              <span class="rating-value">${p.rating}</span>
            </div>
            <div class="product-footer">
              <span class="product-price">$${p.price}</span>
              <button class="btn-add-cart" onclick="Cart.addItem(${p.id}, 1)" title="Add to cart">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function getCategoryColor(cat) {
      const c = {'Backpacks':'linear-gradient(135deg,#059669,#10b981)','Tents':'linear-gradient(135deg,#0284c7,#38bdf8)','Gear':'linear-gradient(135deg,#d97706,#fbbf24)','Clothing':'linear-gradient(135deg,#7c3aed,#a78bfa)'};
      return c[cat] || 'linear-gradient(135deg,#6b7280,#9ca3af)';
    }
    function getCategoryEmoji(cat) {
      const e = {'Backpacks':'🎒','Tents':'⛺','Gear':'🧭','Clothing':'🧥'};
      return e[cat] || '📦';
    }
  </script>
</body>
</html>
